<html>
    <head>
        <title>form Elements</title>
    </head>
    <body>
        <h1>SLA INSTUTE</h1>
        
    </body>

    <section>

        <div>
            <center

                <label>Enter the Mobile no</label>

                <input type="radio" required name="gender">FeMale

                <label>DEGREE</label>

                 <br/>

                 
               
                <input type="Tel" minlength="2004"/>

                <br/>

                <input type="radio" name="Full Stack Developer"/>Java Full Stack Developer
                <br/>

                <input type="radio" name="Full Stack Developer"/>Python Full Stack Developer

                <br/>

                <label>Skill</label>
                <br/>

                <label>Skill</label>

                <input type="checkbox" name="Skill"/>APTITUDE

            ></center>
        </div>

    </section>
